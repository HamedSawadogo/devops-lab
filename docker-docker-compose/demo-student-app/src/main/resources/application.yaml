spring:
  application:
    name: demo-student-app
  datasource:
    url: jdbc:postgresql://localhost:5460/studentdb
    username: student
    password: student123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  thymeleaf:
    cache: false

server:
  port: 9000
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .stat-card { border-left: 4px solid #0d6efd; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-mortarboard-fill me-2"></i>Student Manager
        </a>
        <a href="/students/new" class="btn btn-light btn-sm">
            <i class="bi bi-plus-lg me-1"></i>New Student
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Stats row -->
    <div class="row mb-4 g-3">
        <div class="col-sm-6 col-lg-3">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1 small">Total Students</p>
                        <h3 class="fw-bold mb-0" th:text="${totalStudents}">0</h3>
                    </div>
                    <div class="bg-primary bg-opacity-10 rounded-circle p-3">
                        <i class="bi bi-people-fill fs-4 text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Students table -->
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h6 class="mb-0 fw-semibold"><i class="bi bi-table me-2 text-primary"></i>All Students</h6>
            <a href="/students/new" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Add Student
            </a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Major</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-2 d-block mb-2 opacity-50"></i>
                                No students yet. <a href="/students/new">Add the first one!</a>
                            </td>
                        </tr>
                        <tr th:each="s : ${students}">
                            <td class="ps-3 text-muted small" th:text="${s.id}"></td>
                            <td th:text="${s.firstName}"></td>
                            <td th:text="${s.lastName}"></td>
                            <td>
                                <a th:href="'mailto:' + ${s.email}" class="text-decoration-none" th:text="${s.email}"></a>
                            </td>
                            <td th:text="${s.age != null ? s.age : '-'}"></td>
                            <td>
                                <span th:if="${s.major != null and !#strings.isEmpty(s.major)}"
                                      class="badge bg-primary bg-opacity-10 text-primary"
                                      th:text="${s.major}"></span>
                                <span th:if="${s.major == null or #strings.isEmpty(s.major)}" class="text-muted">-</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/students/edit/{id}(id=${s.id})}"
                                   class="btn btn-sm btn-outline-warning me-1" title="Edit">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <a th:href="@{/students/delete/{id}(id=${s.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Delete"
                                   onclick="return confirm('Delete this student?')">
                                    <i class="bi bi-trash-fill"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white text-muted small py-2 px-3"
             th:if="${!#lists.isEmpty(students)}"
             th:text="${totalStudents} + ' student(s) registered'">
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

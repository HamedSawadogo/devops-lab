<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Student' : 'Add Student'">Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-mortarboard-fill me-2"></i>Student Manager
        </a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
                    <li class="breadcrumb-item active"
                        th:text="${isEdit} ? 'Edit Student' : 'New Student'"></li>
                </ol>
            </nav>

            <div class="card shadow-sm">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0 fw-semibold">
                        <i class="bi bi-person-plus-fill me-2 text-primary" th:if="${!isEdit}"></i>
                        <i class="bi bi-person-gear me-2 text-warning" th:if="${isEdit}"></i>
                        <span th:text="${isEdit} ? 'Edit Student' : 'Add New Student'"></span>
                    </h6>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/students/save}" th:object="${student}" method="post" novalidate>
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">First Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{firstName}"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                       placeholder="John">
                                <div class="invalid-feedback" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Last Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{lastName}"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                       placeholder="Doe">
                                <div class="invalid-feedback" th:errors="*{lastName}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="john.doe@example.com">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Age</label>
                                <input type="number" class="form-control"
                                       th:field="*{age}"
                                       th:classappend="${#fields.hasErrors('age')} ? 'is-invalid'"
                                       min="1" max="120" placeholder="20">
                                <div class="invalid-feedback" th:errors="*{age}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Major</label>
                                <input type="text" class="form-control"
                                       th:field="*{major}"
                                       placeholder="Computer Science">
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Save Student
                            </button>
                            <a href="/" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-app
  labels:
    app: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordpress-app
  template:
    metadata:
      labels:
        app: wordpress-app
    spec:
      containers:
        - name: wordpress-app
          image: wordpress:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: "/var/www/html/wp-content"
              name: wordpress-data
          env:
            - name: "WORDPRESS_DB_HOST"
              value: "mysql-service"
            - name: "WORDPRESS_DB_USER"
              value: "exampleuser"
            - name: "WORDPRESS_DB_PASSWORD"
              value: "examplepass"
            - name: "WORDPRESS_DB_NAME"
              value: "exampledb"
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-pvc
      
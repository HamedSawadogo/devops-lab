apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-database
  labels:
    app:  mysql-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-database
  template:
    metadata:
      labels:
        app: mysql-database
    spec:
      containers:
        - name: mysql-database
          image:  mysql:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: "MYSQL_DATABASE"
              value: "exampledb"
            - name: "MYSQL_USER"
              value: "exampleuser"
            - name: "MYSQL_ROOT_PASSWORD"
              value: "examplepass"
            - name: "MYSQL_PASSWORD"
              value: "examplepass"
          ports:
            - containerPort: 3306
              protocol: TCP